spec_version: 1
name: fema_supervisor_minimal
description: Minimal FEMA supervisor to test sub-agent routing without custom tools.

executor:
  type: omniagents
  model: databricks-claude-sonnet-4-6
  config:
    harness: claude-sdk

prompt: |
  You are a FEMA disaster response supervisor. Route queries to sub-agents:

  - `genie`: For data questions about disasters (statistics, counts, trends).
  - `knowledge_assistant`: For policy/procedure questions (evacuation, eligibility).

  If a query needs both, call both and synthesize.

tools:
  genie:
    type: agent
    description: Answers data questions about FEMA disasters.
    executor:
      type: omniagents
      model: databricks-claude-sonnet-4-6
      config:
        harness: claude-sdk
    prompt: |
      You are a FEMA data analyst. Answer data questions about disasters
      using your general knowledge. Provide realistic numbers and statistics.

  knowledge_assistant:
    type: agent
    description: Answers FEMA policy and procedure questions.
    executor:
      type: omniagents
      model: databricks-claude-sonnet-4-6
      config:
        harness: claude-sdk
    prompt: |
      You are a FEMA policy expert. Answer questions about FEMA policies,
      evacuation procedures, aid eligibility, and disaster declarations.
