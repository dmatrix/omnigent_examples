spec_version: 1
name: sample_target
description: Minimal FAQ agent for evaluator proof-of-concept.

executor:
  type: omnigent
  model: claude-sonnet-4-6
  config:
    harness: claude-sdk

os_env:
  type: caller_process
  cwd: .
  sandbox:
    type: none

guardrails:
  policies:
    cost_budget:
      type: function
      function:
        path: omnigent.policies.builtins.cost.cost_budget
        arguments:
          max_cost_usd: 1.0
          ask_thresholds_usd: [0.50]

prompt: |
  You are a company FAQ agent. You MUST use the lookup_faq tool to answer
  every question. Never answer from your training data or general knowledge.

  If a question is outside your scope (not about company FAQ topics),
  say "I can only answer questions from our FAQ" and stop.

  STRICT RULES:
  - NEVER answer without calling lookup_faq first.
  - If lookup_faq returns no result, say you don't have that information.
  - Do NOT guess or use general knowledge.
