<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 880" font-family="'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="userG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#48c9b0"/>
      <stop offset="100%" stop-color="#1abc9c"/>
    </linearGradient>
    <linearGradient id="evalG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2980b9"/>
      <stop offset="100%" stop-color="#1a5276"/>
    </linearGradient>
    <linearGradient id="targetG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e97c00"/>
      <stop offset="100%" stop-color="#f5a623"/>
    </linearGradient>
    <linearGradient id="mlflowG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0174b5"/>
      <stop offset="100%" stop-color="#0194e2"/>
    </linearGradient>
    <linearGradient id="scorerG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#533483"/>
      <stop offset="100%" stop-color="#6c3d9e"/>
    </linearGradient>
    <linearGradient id="policyG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e94560"/>
      <stop offset="100%" stop-color="#c73e54"/>
    </linearGradient>
    <linearGradient id="toolG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1b6b4a"/>
      <stop offset="100%" stop-color="#148f4b"/>
    </linearGradient>
    <linearGradient id="reportG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0f3460"/>
      <stop offset="100%" stop-color="#1a5276"/>
    </linearGradient>
    <linearGradient id="spawnG" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e97c00"/>
      <stop offset="100%" stop-color="#f5a623"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#000" flood-opacity="0.35"/>
    </filter>
    <marker id="arrowTeal" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#48c9b0" opacity="0.7"/>
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#f5a623" opacity="0.7"/>
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#0194e2" opacity="0.7"/>
    </marker>
    <marker id="arrowPurple" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#6c3d9e" opacity="0.7"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="880" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g opacity="0.03" stroke="#fff" stroke-width="0.5">
    <line x1="0" y1="100" x2="900" y2="100"/><line x1="0" y1="200" x2="900" y2="200"/>
    <line x1="0" y1="300" x2="900" y2="300"/><line x1="0" y1="400" x2="900" y2="400"/>
    <line x1="0" y1="500" x2="900" y2="500"/><line x1="0" y1="600" x2="900" y2="600"/>
    <line x1="0" y1="700" x2="900" y2="700"/><line x1="0" y1="800" x2="900" y2="800"/>
    <line x1="150" y1="0" x2="150" y2="880"/><line x1="300" y1="0" x2="300" y2="880"/>
    <line x1="450" y1="0" x2="450" y2="880"/><line x1="600" y1="0" x2="600" y2="880"/>
    <line x1="750" y1="0" x2="750" y2="880"/>
  </g>

  <!-- Decorative circles -->
  <circle cx="80" cy="120" r="40" fill="#0194e2" opacity="0.04"/>
  <circle cx="820" cy="500" r="55" fill="#6c3d9e" opacity="0.04"/>
  <circle cx="750" cy="100" r="35" fill="#48c9b0" opacity="0.04"/>
  <circle cx="120" cy="700" r="45" fill="#f5a623" opacity="0.04"/>

  <!-- Title -->
  <text x="450" y="38" text-anchor="middle" fill="#fff" font-size="18" font-weight="700" letter-spacing="1">Agent Evaluator — MLflow Scoring via Spawn</text>
  <text x="450" y="58" text-anchor="middle" fill="#8899aa" font-size="11">Launch Any Agent  |  Collect Traces  |  Score with LLM Judges  |  No Eval Dataset</text>

  <!-- ============ User Prompt ============ -->
  <rect x="250" y="75" width="400" height="44" rx="22" fill="url(#userG)" filter="url(#shadow)"/>
  <text x="290" y="100" fill="#fff" font-size="12" font-weight="600">Evaluate agents/sample_target/ ...</text>
  <text x="605" y="98" fill="#fff" font-size="16">&#x1F464;</text>

  <!-- Arrow: User -> Evaluator -->
  <line x1="450" y1="119" x2="450" y2="148" stroke="#48c9b0" stroke-width="2" opacity="0.8"/>
  <polygon points="445,146 455,146 450,156" fill="#48c9b0" opacity="0.8"/>

  <!-- ============ Evaluator Agent ============ -->
  <rect x="150" y="156" width="600" height="65" rx="12" fill="url(#evalG)" filter="url(#shadow)"/>
  <text x="450" y="183" text-anchor="middle" fill="#fff" font-size="16" font-weight="700">agent_evaluator</text>
  <text x="450" y="200" text-anchor="middle" fill="#a8d8ea" font-size="10">claude-sdk  |  claude-opus-4-8  |  spawn: true  |  cost_budget $15</text>
  <text x="450" y="213" text-anchor="middle" fill="#7ec8e3" font-size="8" font-style="italic">Tools: run_agent, collect_traces, evaluate_traces, check_policies  |  Skill: eval-report</text>

  <!-- ============ Spawn Banner ============ -->
  <rect x="100" y="238" width="700" height="30" rx="8" fill="url(#spawnG)" filter="url(#shadow)" opacity="0.15"/>
  <rect x="100" y="238" width="700" height="30" rx="8" fill="none" stroke="#f5a623" stroke-width="1.2" opacity="0.6"/>
  <text x="450" y="258" text-anchor="middle" fill="#f5a623" font-size="11" font-weight="700">sys_session_create(config_path=&quot;examples/agent_evaluator/agents/sample_target/&quot;)</text>

  <!-- ============ Stage 1: Target Agent ============ -->
  <text x="80" y="295" fill="#f5a623" font-size="11" font-weight="700">&#x2460; Run Target</text>

  <!-- Arrow: Evaluator -> Target -->
  <line x1="300" y1="268" x2="300" y2="305" stroke="#f5a623" stroke-width="2" opacity="0.7" marker-end="url(#arrowOrange)"/>

  <!-- Target Agent box -->
  <rect x="60" y="310" width="380" height="120" rx="12" fill="url(#targetG)" filter="url(#shadow)"/>
  <text x="250" y="337" text-anchor="middle" fill="#fff" font-size="15" font-weight="700">sample_target</text>
  <text x="250" y="357" text-anchor="middle" fill="#ffecd2" font-size="10">claude-sdk  |  claude-sonnet-4-6  |  cost_budget $1</text>
  <line x1="80" y1="365" x2="420" y2="365" stroke="#fff" stroke-width="0.5" opacity="0.2"/>
  <text x="250" y="383" text-anchor="middle" fill="#fff" font-size="10">Company FAQ Agent (PoC Target)</text>
  <text x="250" y="400" text-anchor="middle" fill="#ffd5a0" font-size="9">Strict tool usage — must call lookup_faq, declines out-of-scope</text>
  <text x="250" y="417" text-anchor="middle" fill="#e8c07a" font-size="8" font-style="italic">sys_session_send(session_id, args=prompt) per test prompt</text>

  <!-- lookup_faq tool -->
  <rect x="100" y="448" width="260" height="55" rx="8" fill="url(#toolG)" filter="url(#shadow)"/>
  <text x="230" y="472" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">lookup_faq</text>
  <text x="230" y="487" text-anchor="middle" fill="#a8e6cf" font-size="8">@tool  |  In-memory Python dict</text>
  <text x="230" y="499" text-anchor="middle" fill="#7dcea0" font-size="7">pricing, refunds, hours, shipping, contact</text>

  <!-- Arrow: Target -> Tool -->
  <line x1="230" y1="430" x2="230" y2="448" stroke="#2ecc71" stroke-width="1.5" opacity="0.6"/>

  <!-- ============ MLflow Tracing ============ -->
  <rect x="490" y="310" width="360" height="90" rx="12" fill="url(#mlflowG)" filter="url(#shadow)"/>
  <text x="670" y="337" text-anchor="middle" fill="#fff" font-size="15" font-weight="700">MLflow Tracing</text>
  <text x="670" y="357" text-anchor="middle" fill="#b3e0ff" font-size="10">/setup-mlflow-tracing-claude  |  autolog</text>
  <line x1="510" y1="365" x2="830" y2="365" stroke="#fff" stroke-width="0.5" opacity="0.2"/>
  <text x="670" y="383" text-anchor="middle" fill="#d4efff" font-size="9">Captures tool calls, LLM requests, policy events</text>
  <text x="670" y="397" text-anchor="middle" fill="#80d0ff" font-size="8" font-style="italic">mlflow.search_traces(experiment_ids=[...])</text>

  <!-- Dashed line: Target -> MLflow (traces flow) -->
  <path d="M440,370 L490,370" fill="none" stroke="#0194e2" stroke-width="1.5" stroke-dasharray="5 3" opacity="0.6"/>
  <text x="465" y="363" fill="#0194e2" font-size="7" font-weight="600">traces</text>

  <!-- Arrow: Evaluator -> MLflow -->
  <line x1="600" y1="268" x2="600" y2="305" stroke="#0194e2" stroke-width="2" opacity="0.7" marker-end="url(#arrowBlue)"/>

  <!-- ============ Stage 2-3: Evaluation Pipeline ============ -->
  <text x="80" y="540" fill="#6c3d9e" font-size="11" font-weight="700">&#x2461; Collect &amp; Score</text>

  <!-- collect_traces -->
  <rect x="60" y="555" width="170" height="55" rx="8" fill="url(#reportG)" filter="url(#shadow)"/>
  <text x="145" y="578" text-anchor="middle" fill="#4fc3f7" font-size="11" font-weight="700">collect_traces</text>
  <text x="145" y="596" text-anchor="middle" fill="#85c1e9" font-size="8">Fetches traces from MLflow</text>

  <!-- Arrow: collect -> evaluate -->
  <line x1="230" y1="582" x2="258" y2="582" stroke="#fff" stroke-width="1.5" opacity="0.4"/>
  <polygon points="256,578 256,586 264,582" fill="#fff" opacity="0.4"/>

  <!-- evaluate_traces -->
  <rect x="265" y="555" width="170" height="55" rx="8" fill="url(#scorerG)" filter="url(#shadow)"/>
  <text x="350" y="578" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">evaluate_traces</text>
  <text x="350" y="596" text-anchor="middle" fill="#d7bde2" font-size="8">mlflow.genai.evaluate()</text>

  <!-- Arrow: evaluate -> check_policies -->
  <line x1="435" y1="582" x2="463" y2="582" stroke="#fff" stroke-width="1.5" opacity="0.4"/>
  <polygon points="461,578 461,586 469,582" fill="#fff" opacity="0.4"/>

  <!-- check_policies -->
  <rect x="470" y="555" width="170" height="55" rx="8" fill="url(#policyG)" filter="url(#shadow)"/>
  <text x="555" y="578" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">check_policies</text>
  <text x="555" y="596" text-anchor="middle" fill="#ffd5dd" font-size="8">DENY / ASK / label events</text>

  <!-- Arrow: check_policies -> report -->
  <line x1="640" y1="582" x2="668" y2="582" stroke="#fff" stroke-width="1.5" opacity="0.4"/>
  <polygon points="666,578 666,586 674,582" fill="#fff" opacity="0.4"/>

  <!-- eval-report skill -->
  <rect x="675" y="555" width="170" height="55" rx="8" fill="url(#evalG)" filter="url(#shadow)" opacity="0.85"/>
  <text x="760" y="578" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">eval-report</text>
  <text x="760" y="596" text-anchor="middle" fill="#a8d8ea" font-size="8">Skill: graded summary</text>

  <!-- ============ Five Scorers ============ -->
  <text x="450" y="640" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">MLflow Scorers</text>

  <!-- Scorer 1: RelevanceToQuery -->
  <rect x="30" y="655" width="155" height="55" rx="8" fill="#0d3b1f" opacity="0.5" stroke="#2ecc71" stroke-width="1"/>
  <text x="107" y="677" text-anchor="middle" fill="#2ecc71" font-size="10" font-weight="700">RelevanceToQuery</text>
  <text x="107" y="693" text-anchor="middle" fill="#a8e6cf" font-size="7">Is the response on-topic?</text>
  <text x="107" y="704" text-anchor="middle" fill="#7dcea0" font-size="7">Works from trace I/O</text>

  <!-- Scorer 2: Safety -->
  <rect x="200" y="655" width="130" height="55" rx="8" fill="#3b0d0d" opacity="0.5" stroke="#e74c3c" stroke-width="1"/>
  <text x="265" y="677" text-anchor="middle" fill="#e74c3c" font-size="10" font-weight="700">Safety</text>
  <text x="265" y="693" text-anchor="middle" fill="#f5b7b1" font-size="7">Any unsafe content?</text>
  <text x="265" y="704" text-anchor="middle" fill="#e6a09e" font-size="7">LLM-judged</text>

  <!-- Scorer 3: Guidelines -->
  <rect x="345" y="655" width="130" height="55" rx="8" fill="#3b2d0d" opacity="0.5" stroke="#f5a623" stroke-width="1"/>
  <text x="410" y="677" text-anchor="middle" fill="#f5a623" font-size="10" font-weight="700">Guidelines</text>
  <text x="410" y="693" text-anchor="middle" fill="#fdebd0" font-size="7">Must use tools, not</text>
  <text x="410" y="704" text-anchor="middle" fill="#f5cba7" font-size="7">training data</text>

  <!-- Scorer 4: ToolSelection -->
  <rect x="490" y="655" width="155" height="55" rx="8" fill="#1a0d3b" opacity="0.5" stroke="#bb86fc" stroke-width="1"/>
  <text x="567" y="677" text-anchor="middle" fill="#bb86fc" font-size="10" font-weight="700">ToolSelection</text>
  <text x="567" y="693" text-anchor="middle" fill="#d7bde2" font-size="7">Right tool for the task?</text>
  <text x="567" y="704" text-anchor="middle" fill="#c39bd3" font-size="7">TruLens scorer</text>

  <!-- Scorer 5: LogicalConsistency -->
  <rect x="660" y="655" width="195" height="55" rx="8" fill="#0d2a3b" opacity="0.5" stroke="#4fc3f7" stroke-width="1"/>
  <text x="757" y="677" text-anchor="middle" fill="#4fc3f7" font-size="10" font-weight="700">LogicalConsistency</text>
  <text x="757" y="693" text-anchor="middle" fill="#85c1e9" font-size="7">Coherent reasoning?</text>
  <text x="757" y="704" text-anchor="middle" fill="#7ec8e3" font-size="7">TruLens scorer</text>

  <!-- ============ Output ============ -->
  <line x1="450" y1="720" x2="450" y2="745" stroke="#48c9b0" stroke-width="2" opacity="0.6"/>
  <polygon points="445,743 455,743 450,753" fill="#48c9b0" opacity="0.6"/>

  <rect x="270" y="753" width="360" height="44" rx="22" fill="url(#userG)" filter="url(#shadow)" opacity="0.85"/>
  <text x="450" y="774" text-anchor="middle" fill="#fff" font-size="14" font-weight="600">Graded Evaluation Report</text>
  <text x="450" y="789" text-anchor="middle" fill="#d5f5e3" font-size="9">A / B / C / D / F  |  Per-scorer metrics  |  Policy compliance</text>

  <!-- ============ Footer Badges ============ -->
  <g transform="translate(0, 820)">
    <rect x="35" y="0" width="105" height="20" rx="10" fill="#2980b9" opacity="0.25"/>
    <text x="87" y="14" text-anchor="middle" fill="#2980b9" font-size="9" font-weight="600">Omnigent CLI</text>

    <rect x="155" y="0" width="100" height="20" rx="10" fill="#f5a623" opacity="0.25"/>
    <text x="205" y="14" text-anchor="middle" fill="#f5a623" font-size="9" font-weight="600">spawn: true</text>

    <rect x="270" y="0" width="95" height="20" rx="10" fill="#0194e2" opacity="0.25"/>
    <text x="317" y="14" text-anchor="middle" fill="#0194e2" font-size="9" font-weight="600">MLflow</text>

    <rect x="380" y="0" width="120" height="20" rx="10" fill="#6c3d9e" opacity="0.25"/>
    <text x="440" y="14" text-anchor="middle" fill="#6c3d9e" font-size="9" font-weight="600">LLM Judges</text>

    <rect x="515" y="0" width="120" height="20" rx="10" fill="#e94560" opacity="0.25"/>
    <text x="575" y="14" text-anchor="middle" fill="#e94560" font-size="9" font-weight="600">Policy Check</text>

    <rect x="650" y="0" width="120" height="20" rx="10" fill="#2ecc71" opacity="0.25"/>
    <text x="710" y="14" text-anchor="middle" fill="#2ecc71" font-size="9" font-weight="600">No Eval Dataset</text>

    <rect x="785" y="0" width="80" height="20" rx="10" fill="#48c9b0" opacity="0.25"/>
    <text x="825" y="14" text-anchor="middle" fill="#48c9b0" font-size="9" font-weight="600">Generic</text>
  </g>
</svg>
