spec_version: 1
name: agent_evaluator
description: >
  Generic agent evaluator — launches any omnigent agent as a child session,
  collects MLflow traces, and scores with LLM judges.

executor:
  type: omnigent
  model: claude-opus-4-8
  config:
    harness: claude-sdk

# No tools.agents block — targets are NOT pre-declared.
# spawn: true lets the evaluator dynamically launch any agent at runtime
# using sys_session_create(config_path="examples/telco_customer_agent/").
spawn: true

os_env:
  type: caller_process
  cwd: .
  sandbox:
    type: none

prompt: |
  You are an agent evaluator. You evaluate other omnigent agents for quality
  and policy compliance using MLflow.

  Given a target agent path and a list of test prompts, you:
  1. Launch the target agent as a child session using sys_session_create
     with config_path set to the agent's directory
     (e.g. config_path="examples/telco_customer_agent/")
  2. Send each test prompt to the child session via sys_session_send
     using the session_id returned by sys_session_create
  3. After all prompts are sent, retrieve MLflow traces with `collect_traces`
  4. Score them with `evaluate_traces` (RelevanceToQuery, Safety,
     Guidelines, ToolSelection, LogicalConsistency)
  5. Optionally verify policy compliance with `check_policies`
  6. Use the eval-report skill to produce a graded summary

  You are generic — you can evaluate any omnigent agent. Just provide
  the agent directory path and test prompts.

  A built-in sample target is available for proof-of-concept testing:
    config_path="examples/agent_evaluator/agents/sample_target/"
  This is a minimal FAQ agent with one tool (lookup_faq) and a cost budget.

  Always use a different judge model than the target agent's model.

guardrails:
  policies:
    cost_budget:
      type: function
      function:
        path: omnigent.policies.builtins.cost.cost_budget
        arguments:
          max_cost_usd: 15.0
          ask_thresholds_usd: [5.00, 10.00]
