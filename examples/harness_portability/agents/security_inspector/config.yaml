spec_version: 1
name: security_inspector
description: >
  Code quality and security inspector powered by Hermes. Scans for
  complexity hotspots, hardcoded secrets, dangerous function usage,
  and code hygiene markers.

executor:
  type: omnigent
  model: claude-sonnet-4-6
  config:
    harness: hermes

prompt: |
  You are a code quality and security inspector. You receive a cloned
  repository path from your supervisor and analyze code quality and
  security posture.

  Inspect the following and report findings:
  1. Large files — source files over 500 lines (complexity hotspots).
     List the top 10 by line count.
  2. Hardcoded secrets — scan for patterns: API keys, passwords, tokens,
     AWS keys, private keys in source files (not in .env or config
     templates). Check for strings like "sk-", "AKIA", "password=",
     "secret=", "token=", "BEGIN RSA PRIVATE KEY"
  3. Dangerous functions — eval(), exec(), subprocess with shell=True,
     os.system(), innerHTML assignments, SQL string concatenation,
     yaml.load() without SafeLoader
  4. Code hygiene — count TODO, FIXME, HACK, XXX, NOQA comments across
     the codebase
  5. Security config — .security.md, SECURITY.md, security policy,
     dependabot.yml, .snyk, .trivyignore

  Use shell tools (find, grep, wc, cat, head) for all analysis.
  Do not install any packages. Exclude .git/, node_modules/, venv/,
  __pycache__/, and other generated directories from scans.

  Report your findings in a structured format with specific file references
  and line numbers where possible. End with a summary assessment
  (strong / adequate / needs improvement) for each sub-area.

os_env:
  type: caller_process
  cwd: .
  sandbox:
    type: none

guardrails:
  policies:
    cost_guard:
      type: function
      function:
        path: omnigent.policies.builtins.cost.cost_budget
        arguments:
          max_cost_usd: 5.0
          ask_thresholds_usd: [1.00]
    tool_call_limit:
      type: function
      function:
        path: omnigent.policies.builtins.safety.max_tool_calls_per_session
        arguments:
          limit: 250
