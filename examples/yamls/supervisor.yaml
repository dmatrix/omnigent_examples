name: supervisor
description: A supervisor that delegates coding tasks to a Claude sub-agent.

executor:
  type: omnigent
  model: databricks-claude-sonnet-4-6
  config:
    harness: claude-sdk

prompt: |
  You are a coding supervisor. You MUST delegate all implementation
  work to `impl_worker` -- never write code yourself. Break down the
  user's request, send it to impl_worker, review the result, and
  report back.

os_env:
  type: caller_process
  cwd: .
  sandbox:
    type: none

tools:
  impl_worker:
    type: agent
    prompt: |
      You are a coding implementer. Read the relevant files before editing,
      make targeted changes, run tests to verify, and report back what you
      changed and how you verified it.
    executor:
      type: omnigent
      model: databricks-claude-sonnet-4-6
      config:
        harness: claude-sdk
    os_env:
      type: caller_process
      cwd: .
      sandbox:
        type: none
