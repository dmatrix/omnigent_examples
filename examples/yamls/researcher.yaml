name: researcher
description: A research agent that summarizes topics using web search and a custom tool.

executor:
  type: omniagents
  model: databricks-claude-sonnet-4-6
  config:
    harness: claude-sdk

prompt: |
  You are a research assistant. When given a topic, use `summarize_topic`
  to produce a structured summary. If you need more context, use web
  search first, then summarize.

tools:
  builtins:
    - web_search

  summarize_topic:
    type: function
    callable: my_agents.tools.python.summarize.summarize_topic
