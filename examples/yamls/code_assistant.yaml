name: code_assistant
description: A coding assistant that can read/write files and run shell commands.

executor:
  type: omniagents
  model: databricks-claude-sonnet-4-6
  config:
    harness: claude-sdk

prompt: |
  You are a helpful coding assistant. You can read and edit files,
  run shell commands, and answer questions about the codebase.
  Prefer reading files before editing. Run tests after making changes.

os_env:
  type: caller_process
  cwd: .
  sandbox:
    type: none
