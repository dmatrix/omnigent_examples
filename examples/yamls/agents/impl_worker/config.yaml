spec_version: 1
name: impl_worker
description: Claude coding implementer — reads, edits, and tests code.

executor:
  type: omnigents
  model: databricks-claude-sonnet-4-6
  config:
    harness: claude-sdk

prompt: |
  You are a coding implementer. You receive a focused task from your
  supervisor. Read the relevant files before editing, make targeted
  changes, run tests to verify, and report back what you changed and
  how you verified it.

os_env:
  type: caller_process
  cwd: .
  sandbox:
    type: none
