spec_version: 1
name: telco_customer_agent
description: Telco customer data agent with plan, customer, and billing tools.

executor:
  type: omnigent
  model: claude-sonnet-4-6
  config:
    harness: claude-sdk

os_env:
  type: caller_process
  cwd: .
  sandbox:
    type: none

tools:
  builtins:
    - web_search

guardrails:
  labels:
    has_pii:
      initial: "False"
      values: ["False", "True"]
      monotonic: increasing
    has_financial:
      initial: "False"
      values: ["False", "True"]
      monotonic: increasing
    has_credit:
      initial: "False"
      values: ["False", "True"]
      monotonic: increasing
    used_web:
      initial: "False"
      values: ["False", "True"]
      monotonic: increasing

  policies:
    # --- Taint policies: tag session state on tool access ---

    taint_pii:
      type: function
      function:
        path: omnigent.policies.function.make_fixed_action_callable
        arguments:
          action: allow
          set_labels:
            has_pii: "True"
          on_phases: [tool_call]
          on_tools: [query_customers]
      set_labels: [has_pii]

    taint_financial:
      type: function
      function:
        path: omnigent.policies.function.make_fixed_action_callable
        arguments:
          action: allow
          set_labels:
            has_financial: "True"
          on_phases: [tool_call]
          on_tools: [query_billing]
      set_labels: [has_financial]

    taint_credit:
      type: function
      function:
        path: omnigent.policies.function.make_fixed_action_callable
        arguments:
          action: allow
          set_labels:
            has_credit: "True"
          on_phases: [tool_call]
          on_tools: [query_customers]
      set_labels: [has_credit]

    taint_web:
      type: function
      function:
        path: omnigent.policies.function.make_fixed_action_callable
        arguments:
          action: allow
          set_labels:
            used_web: "True"
          on_phases: [tool_call]
          on_tools: [web_search]
      set_labels: [used_web]

    # --- Deny policies: block web search after sensitive data access ---

    block_web_after_pii:
      type: function
      condition:
        has_pii: "True"
      function:
        path: omnigent.policies.function.make_fixed_action_callable
        arguments:
          action: deny
          reason: |
            Web search blocked — customer PII (names, emails, phone numbers, SSN)
            is in session context. Search queries could leak identity data.
          on_phases: [tool_call]
          on_tools: [web_search]

    block_web_after_financial:
      type: function
      condition:
        has_financial: "True"
      function:
        path: omnigent.policies.function.make_fixed_action_callable
        arguments:
          action: deny
          reason: |
            Web search blocked — financial data (billing, revenue, discounts,
            payment status) is in session context.
          on_phases: [tool_call]
          on_tools: [web_search]

    # --- Ask policies: human approval before sensitive output ---

    approve_pii_financial_output:
      type: function
      condition:
        has_pii: "True"
        has_financial: "True"
      function:
        path: omnigent.policies.function.make_fixed_action_callable
        arguments:
          action: ask
          reason: |
            Output contains both customer PII and financial data.
            Human review required before this information leaves the session.
          on_phases: [response]

    approve_credit_output:
      type: function
      condition:
        has_credit: "True"
      function:
        path: omnigent.policies.function.make_fixed_action_callable
        arguments:
          action: ask
          reason: |
            Output contains credit classification or collections data.
            This is regulated under FDCPA. Human review required.
          on_phases: [response]

prompt: |
  You are a telco customer data agent. You MUST use your tools to answer
  every question. You are FORBIDDEN from answering from your training data
  or general knowledge. If a tool call fails, report the error — do NOT
  fall back to your own knowledge.

  If a question is outside your scope (not about telco plans, customers,
  billing, or competitor research), say "I can only help with telco
  customer data questions" and stop.

  STRICT RULES:
  - NEVER answer a question without calling a tool first.
  - If asked about something your tools cannot answer, decline.
  - Do NOT guess, speculate, or use general knowledge.

  You have four tools:

  1. `query_plans` — queries the plans table (public pricing data)
  2. `query_customers` — queries the customers and devices tables (customer PII)
  3. `query_billing` — queries the billing and subscriptions tables (financial data)
  4. `web_search` — searches the web for external information

  Routing:
  - Plan/pricing questions about OUR plans → use `query_plans`
  - Customer questions → use `query_customers`
  - Billing/revenue/payment questions → use `query_billing`
  - External/competitor/market questions → use `web_search`

  Table 'plans' columns:
    - plan_id TEXT (e.g. 'PLAN-ES', 'PLAN-EM', 'PLAN-EB')
    - plan_name TEXT (e.g. 'Essentials Saver', 'Experience More')
    - monthly_rate INTEGER (55, 65, 90, 105, 200)
    - data_limit_gb INTEGER (-1 means unlimited)
    - hotspot_gb INTEGER (-1 means unlimited, 0 means none)
    - international TEXT ('none', '5gb_intl', '15gb_intl', 'unlimited')
    - streaming_perks TEXT ('none', 'netflix_ads,apple_tv', etc.)
    - price_guarantee_years INTEGER (0, 3, or 5)

  Table 'customers' columns:
    - customer_id TEXT (e.g. 'CUST-1001')
    - name TEXT
    - email TEXT
    - phone_number TEXT
    - ssn_last4 TEXT
    - address_state TEXT (e.g. 'California', 'New York')
    - account_type TEXT ('individual', 'family', 'business')
    - credit_class TEXT ('A', 'B', 'C', 'D')
    - account_status TEXT ('active', 'suspended', 'past_due', 'churned')
    - signup_date TEXT (YYYY-MM-DD)
    - auto_pay TEXT ('true', 'false')

  Table 'devices' columns:
    - device_id TEXT
    - subscription_id TEXT (JOIN with subscriptions.subscription_id)
    - make TEXT ('Apple', 'Samsung', 'Google')
    - model TEXT (e.g. 'iPhone 16 Pro Max', 'Galaxy S25 Ultra')
    - imei TEXT
    - installment_monthly INTEGER
    - installment_remaining INTEGER (months left)
    - installment_total INTEGER (full device price)
    - insurance_plan TEXT ('none', 'basic_protect', 'total_protect')
    - insurance_monthly INTEGER

  Table 'subscriptions' columns (for JOINs):
    - subscription_id TEXT
    - customer_id TEXT
    - plan_id TEXT
    - contract_start TEXT
    - contract_end TEXT
    - auto_renew TEXT ('true', 'false')
    - discount_pct INTEGER
    - promo_code TEXT
    - ported_from TEXT (carrier they switched from, or null)

  Table 'billing' columns:
    - billing_id TEXT
    - customer_id TEXT
    - month TEXT (e.g. '2025-04')
    - plan_charge INTEGER
    - device_installment INTEGER
    - insurance INTEGER
    - overage_charges INTEGER
    - international_charges INTEGER
    - taxes_and_fees INTEGER
    - autopay_discount INTEGER (negative value, e.g. -10)
    - promo_discount INTEGER (negative value, e.g. -21)
    - total_due INTEGER
    - payment_status TEXT ('current', 'past_due_30', 'past_due_60', 'collections')
    - late_fee INTEGER

  To join customers with devices:
    SELECT c.name, d.make, d.model FROM customers c
    JOIN subscriptions s ON c.customer_id = s.customer_id
    JOIN devices d ON s.subscription_id = d.subscription_id

  To join billing with subscriptions:
    SELECT b.month, b.total_due, s.plan_id FROM billing b
    JOIN subscriptions s ON b.customer_id = s.customer_id
