<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 920" font-family="'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="userG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#48c9b0"/>
      <stop offset="100%" stop-color="#1abc9c"/>
    </linearGradient>
    <linearGradient id="agentG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2980b9"/>
      <stop offset="100%" stop-color="#1a5276"/>
    </linearGradient>
    <linearGradient id="policyG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e94560"/>
      <stop offset="100%" stop-color="#c73e54"/>
    </linearGradient>
    <linearGradient id="toolCustG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e97c00"/>
      <stop offset="100%" stop-color="#f5a623"/>
    </linearGradient>
    <linearGradient id="toolBillG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#533483"/>
      <stop offset="100%" stop-color="#6c3d9e"/>
    </linearGradient>
    <linearGradient id="toolPlanG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0f3460"/>
      <stop offset="100%" stop-color="#1a5276"/>
    </linearGradient>
    <linearGradient id="toolWebG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1b6b4a"/>
      <stop offset="100%" stop-color="#148f4b"/>
    </linearGradient>
    <linearGradient id="dbG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1b4f72"/>
      <stop offset="100%" stop-color="#154360"/>
    </linearGradient>
    <linearGradient id="labelG" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c0392b"/>
      <stop offset="100%" stop-color="#e74c3c"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="920" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g opacity="0.03" stroke="#fff" stroke-width="0.5">
    <line x1="0" y1="100" x2="900" y2="100"/><line x1="0" y1="200" x2="900" y2="200"/>
    <line x1="0" y1="300" x2="900" y2="300"/><line x1="0" y1="400" x2="900" y2="400"/>
    <line x1="0" y1="500" x2="900" y2="500"/><line x1="0" y1="600" x2="900" y2="600"/>
    <line x1="0" y1="700" x2="900" y2="700"/>
    <line x1="150" y1="0" x2="150" y2="780"/><line x1="300" y1="0" x2="300" y2="780"/>
    <line x1="450" y1="0" x2="450" y2="780"/><line x1="600" y1="0" x2="600" y2="780"/>
    <line x1="750" y1="0" x2="750" y2="780"/>
  </g>

  <!-- Decorative circles -->
  <circle cx="80" cy="120" r="40" fill="#e94560" opacity="0.04"/>
  <circle cx="820" cy="600" r="55" fill="#f5a623" opacity="0.04"/>
  <circle cx="750" cy="100" r="35" fill="#48c9b0" opacity="0.04"/>

  <!-- Title -->
  <text x="450" y="38" text-anchor="middle" fill="#fff" font-size="18" font-weight="700" letter-spacing="1">Telco Customer Agent — 9 Policies, 5 Categories</text>
  <text x="450" y="58" text-anchor="middle" fill="#8899aa" font-size="11">Taint Labels  |  Cost Budget  |  PII Scan  |  Risk Score  |  Custom Bulk Guard</text>

  <!-- ============ User Query ============ -->
  <rect x="330" y="75" width="240" height="44" rx="22" fill="url(#userG)" filter="url(#shadow)"/>
  <text x="370" y="102" fill="#fff" font-size="14" font-weight="600">User Query</text>
  <text x="520" y="100" fill="#fff" font-size="16">&#x1F464;</text>

  <!-- Arrow: User -> Agent -->
  <line x1="450" y1="119" x2="450" y2="148" stroke="#48c9b0" stroke-width="2" opacity="0.8"/>
  <polygon points="445,146 455,146 450,156" fill="#48c9b0" opacity="0.8"/>

  <!-- ============ Agent ============ -->
  <rect x="200" y="156" width="500" height="65" rx="12" fill="url(#agentG)" filter="url(#shadow)"/>
  <text x="450" y="183" text-anchor="middle" fill="#fff" font-size="16" font-weight="700">telco_customer_agent</text>
  <text x="450" y="200" text-anchor="middle" fill="#a8d8ea" font-size="10">Prompt-Driven Routing  |  claude-sdk  |  claude-sonnet-4-6</text>
  <text x="450" y="213" text-anchor="middle" fill="#7ec8e3" font-size="8" font-style="italic">Tools: query_customers, query_billing, query_plans, web_search (builtin)</text>

  <!-- ============ Policy Engine (crimson band) ============ -->
  <rect x="40" y="240" width="820" height="55" rx="10" fill="url(#policyG)" filter="url(#shadow)"/>
  <text x="450" y="262" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">PolicyEngine — Runner Layer</text>
  <text x="450" y="280" text-anchor="middle" fill="#ffd5dd" font-size="9">Intercepts every tool_call and output  |  Checks session labels  |  ALLOW / DENY / ASK</text>

  <!-- ============ Labels State (right side) ============ -->
  <rect x="710" y="310" width="160" height="130" rx="8" fill="url(#labelG)" filter="url(#shadow)" opacity="0.9"/>
  <text x="790" y="332" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">Session Labels</text>
  <text x="790" y="350" text-anchor="middle" fill="#ffd5dd" font-size="9">conversation_labels SQL</text>
  <line x1="725" y1="358" x2="855" y2="358" stroke="#fff" stroke-width="0.5" opacity="0.3"/>
  <text x="730" y="378" fill="#ffecd2" font-size="10" font-family="monospace">has_pii:       false</text>
  <text x="730" y="400" fill="#ffecd2" font-size="10" font-family="monospace">has_financial:  false</text>
  <text x="730" y="422" fill="#ffecd2" font-size="10" font-family="monospace">used_web:      false</text>

  <!-- Arrow: PolicyEngine -> Labels -->
  <path d="M710,270 L790,310" fill="none" stroke="#e94560" stroke-width="1.5" stroke-dasharray="4 3" opacity="0.6"/>
  <text x="760" y="295" fill="#e94560" font-size="7" font-weight="600">set/check</text>

  <!-- ============ Tools Row ============ -->
  <!-- query_customers -->
  <rect x="30" y="315" width="155" height="75" rx="8" fill="url(#toolCustG)" filter="url(#shadow)"/>
  <text x="107" y="340" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">query_customers</text>
  <text x="107" y="355" text-anchor="middle" fill="#ffecd2" font-size="8">@tool  |  Auto-discovered</text>
  <text x="107" y="370" text-anchor="middle" fill="#ffd5a0" font-size="7">Names, emails, phones, SSN</text>
  <text x="107" y="382" text-anchor="middle" fill="#e8c07a" font-size="7" font-style="italic">Sets: has_pii  |  Risk: +3</text>

  <!-- query_billing -->
  <rect x="200" y="315" width="155" height="75" rx="8" fill="url(#toolBillG)" filter="url(#shadow)"/>
  <text x="277" y="340" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">query_billing</text>
  <text x="277" y="355" text-anchor="middle" fill="#d7bde2" font-size="8">@tool  |  Auto-discovered</text>
  <text x="277" y="370" text-anchor="middle" fill="#c39bd3" font-size="7">Revenue, discounts, payments</text>
  <text x="277" y="382" text-anchor="middle" fill="#af7ac5" font-size="7" font-style="italic">Sets: has_financial</text>

  <!-- query_plans -->
  <rect x="370" y="315" width="155" height="75" rx="8" fill="url(#toolPlanG)" filter="url(#shadow)"/>
  <text x="447" y="340" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">query_plans</text>
  <text x="447" y="355" text-anchor="middle" fill="#a8d8ea" font-size="8">@tool  |  Auto-discovered</text>
  <text x="447" y="370" text-anchor="middle" fill="#7ec8e3" font-size="7">Public pricing data</text>
  <text x="447" y="382" text-anchor="middle" fill="#5dade2" font-size="7" font-style="italic">No labels triggered</text>

  <!-- web_search -->
  <rect x="540" y="315" width="155" height="75" rx="8" fill="url(#toolWebG)" filter="url(#shadow)"/>
  <text x="617" y="340" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">web_search</text>
  <text x="617" y="355" text-anchor="middle" fill="#a8e6cf" font-size="8">Builtin</text>
  <text x="617" y="370" text-anchor="middle" fill="#7dcea0" font-size="7">Public web search</text>
  <text x="617" y="382" text-anchor="middle" fill="#52be80" font-size="7" font-style="italic">DENIED if has_pii or has_financial</text>

  <!-- Arrows: Agent -> Tools (through PolicyEngine) -->
  <line x1="300" y1="221" x2="300" y2="240" stroke="#2980b9" stroke-width="1.5" opacity="0.5"/>
  <line x1="450" y1="221" x2="450" y2="240" stroke="#2980b9" stroke-width="1.5" opacity="0.5"/>
  <line x1="600" y1="221" x2="600" y2="240" stroke="#2980b9" stroke-width="1.5" opacity="0.5"/>

  <line x1="107" y1="295" x2="107" y2="315" stroke="#f5a623" stroke-width="1.5" opacity="0.5"/>
  <line x1="277" y1="295" x2="277" y2="315" stroke="#bb86fc" stroke-width="1.5" opacity="0.5"/>
  <line x1="447" y1="295" x2="447" y2="315" stroke="#4fc3f7" stroke-width="1.5" opacity="0.5"/>
  <line x1="617" y1="295" x2="617" y2="315" stroke="#2ecc71" stroke-width="1.5" opacity="0.5"/>

  <!-- ============ SQLite Database ============ -->
  <line x1="107" y1="390" x2="107" y2="420" stroke="#f5a623" stroke-width="1.5" opacity="0.5"/>
  <line x1="277" y1="390" x2="277" y2="420" stroke="#bb86fc" stroke-width="1.5" opacity="0.5"/>
  <line x1="447" y1="390" x2="447" y2="420" stroke="#4fc3f7" stroke-width="1.5" opacity="0.5"/>

  <rect x="30" y="420" width="660" height="55" rx="8" fill="url(#dbG)" filter="url(#shadow)"/>
  <text x="360" y="445" text-anchor="middle" fill="#4fc3f7" font-size="13" font-weight="700">telco.db</text>
  <text x="360" y="462" text-anchor="middle" fill="#85c1e9" font-size="9">SQLite  |  5 tables: plans, customers, devices, subscriptions, billing</text>

  <!-- ============ Policy Scenarios ============ -->
  <text x="450" y="505" text-anchor="middle" fill="#fff" font-size="14" font-weight="700">Policy Enforcement Scenarios</text>

  <!-- Scenario 1: ALLOW -->
  <rect x="40" y="520" width="155" height="70" rx="8" fill="#0d3b1f" opacity="0.5" stroke="#2ecc71" stroke-width="1"/>
  <text x="117" y="542" text-anchor="middle" fill="#2ecc71" font-size="11" font-weight="700">ALLOW</text>
  <text x="117" y="558" text-anchor="middle" fill="#a8e6cf" font-size="8">query_plans</text>
  <text x="117" y="572" text-anchor="middle" fill="#7dcea0" font-size="7">No labels triggered</text>
  <text x="117" y="584" text-anchor="middle" fill="#52be80" font-size="7">Risk score +1</text>

  <!-- Scenario 2: DENY -->
  <rect x="210" y="520" width="155" height="70" rx="8" fill="#3b0d0d" opacity="0.5" stroke="#e74c3c" stroke-width="1"/>
  <text x="287" y="542" text-anchor="middle" fill="#e74c3c" font-size="11" font-weight="700">DENY</text>
  <text x="287" y="558" text-anchor="middle" fill="#f5b7b1" font-size="8">web_search after PII</text>
  <text x="287" y="572" text-anchor="middle" fill="#e6a09e" font-size="7">has_pii blocks web_search</text>
  <text x="287" y="584" text-anchor="middle" fill="#d98880" font-size="7">Taint label enforcement</text>

  <!-- Scenario 3: ASK — Cost -->
  <rect x="380" y="520" width="155" height="70" rx="8" fill="#3b2d0d" opacity="0.5" stroke="#f5a623" stroke-width="1"/>
  <text x="457" y="542" text-anchor="middle" fill="#f5a623" font-size="11" font-weight="700">ASK — Cost</text>
  <text x="457" y="558" text-anchor="middle" fill="#fdebd0" font-size="8">Spend exceeds $1.00</text>
  <text x="457" y="572" text-anchor="middle" fill="#f5cba7" font-size="7">cost_budget threshold</text>
  <text x="457" y="584" text-anchor="middle" fill="#e8b88a" font-size="7">Pauses for approval</text>

  <!-- Scenario 4: ASK — Risk Score -->
  <rect x="550" y="520" width="155" height="70" rx="8" fill="#1a0d3b" opacity="0.5" stroke="#bb86fc" stroke-width="1"/>
  <text x="627" y="542" text-anchor="middle" fill="#bb86fc" font-size="11" font-weight="700">ASK — Risk</text>
  <text x="627" y="558" text-anchor="middle" fill="#d7bde2" font-size="8">Score crosses 10</text>
  <text x="627" y="572" text-anchor="middle" fill="#c39bd3" font-size="7">Billing=5, Customer=3</text>
  <text x="627" y="584" text-anchor="middle" fill="#af7ac5" font-size="7">Stateful accumulation</text>

  <!-- Scenario 5: ASK — Bulk Access -->
  <rect x="720" y="520" width="155" height="70" rx="8" fill="#0d2a3b" opacity="0.5" stroke="#4fc3f7" stroke-width="1"/>
  <text x="797" y="542" text-anchor="middle" fill="#4fc3f7" font-size="11" font-weight="700">ASK — Bulk</text>
  <text x="797" y="558" text-anchor="middle" fill="#85c1e9" font-size="8">4+ distinct customers</text>
  <text x="797" y="572" text-anchor="middle" fill="#7ec8e3" font-size="7">Custom Python policy</text>
  <text x="797" y="584" text-anchor="middle" fill="#5dade2" font-size="7">bulk_access_guard.py</text>

  <!-- ============ PII Leak Prevention ============ -->
  <rect x="200" y="610" width="500" height="35" rx="8" fill="#3b1a0d" opacity="0.5" stroke="#e97c00" stroke-width="1"/>
  <text x="450" y="630" text-anchor="middle" fill="#f5a623" font-size="11" font-weight="700">PII Leak Prevention — deny_pii_in_llm_request</text>
  <text x="450" y="641" text-anchor="middle" fill="#fdebd0" font-size="8">Scans outgoing LLM messages for SSN, email, phone patterns  |  ASK on match</text>

  <!-- ============ Skill ============ -->
  <rect x="300" y="665" width="300" height="45" rx="8" fill="#1b4f72" filter="url(#shadow)" opacity="0.8"/>
  <text x="450" y="687" text-anchor="middle" fill="#4fc3f7" font-size="11" font-weight="700">Skill: customer-report</text>
  <text x="450" y="702" text-anchor="middle" fill="#85c1e9" font-size="8">On-demand via load_skill  |  Redaction rules  |  Churn risk template</text>

  <!-- ============ Output ============ -->
  <line x1="450" y1="710" x2="450" y2="735" stroke="#48c9b0" stroke-width="2" opacity="0.6"/>
  <polygon points="445,733 455,733 450,743" fill="#48c9b0" opacity="0.6"/>

  <rect x="330" y="743" width="240" height="38" rx="19" fill="url(#userG)" filter="url(#shadow)" opacity="0.85"/>
  <text x="450" y="767" text-anchor="middle" fill="#fff" font-size="13" font-weight="600">Policy-Gated Response</text>

  <!-- ============ Policy summary bar ============ -->
  <rect x="100" y="800" width="700" height="40" rx="8" fill="#0f1a2e" stroke="#2980b9" stroke-width="0.5" opacity="0.7"/>
  <text x="450" y="818" text-anchor="middle" fill="#8899aa" font-size="10" font-weight="600">9 Policies: 3 taint labels + 2 deny + cost_budget + deny_pii + risk_score + bulk_access_guard</text>
  <text x="450" y="832" text-anchor="middle" fill="#667788" font-size="8">5 builtin  |  1 custom Python  |  3 taint  |  Session-scoped  |  Framework-enforced</text>

  <!-- ============ Footer Badges ============ -->
  <g transform="translate(0, 860)">
    <rect x="45" y="0" width="120" height="20" rx="10" fill="#2980b9" opacity="0.25"/>
    <text x="105" y="14" text-anchor="middle" fill="#2980b9" font-size="9" font-weight="600">Omnigent CLI</text>

    <rect x="175" y="0" width="110" height="20" rx="10" fill="#e94560" opacity="0.25"/>
    <text x="230" y="14" text-anchor="middle" fill="#e94560" font-size="9" font-weight="600">PolicyEngine</text>

    <rect x="295" y="0" width="90" height="20" rx="10" fill="#f5a623" opacity="0.25"/>
    <text x="340" y="14" text-anchor="middle" fill="#f5a623" font-size="9" font-weight="600">Labels</text>

    <rect x="395" y="0" width="100" height="20" rx="10" fill="#bb86fc" opacity="0.25"/>
    <text x="445" y="14" text-anchor="middle" fill="#bb86fc" font-size="9" font-weight="600">Risk Score</text>

    <rect x="505" y="0" width="110" height="20" rx="10" fill="#e97c00" opacity="0.25"/>
    <text x="560" y="14" text-anchor="middle" fill="#e97c00" font-size="9" font-weight="600">PII Scanner</text>

    <rect x="625" y="0" width="110" height="20" rx="10" fill="#2ecc71" opacity="0.25"/>
    <text x="680" y="14" text-anchor="middle" fill="#2ecc71" font-size="9" font-weight="600">Cost Budget</text>

    <rect x="745" y="0" width="110" height="20" rx="10" fill="#4fc3f7" opacity="0.25"/>
    <text x="800" y="14" text-anchor="middle" fill="#4fc3f7" font-size="9" font-weight="600">Bulk Guard</text>
  </g>
</svg>
