<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 760" font-family="'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="userG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#48c9b0"/>
      <stop offset="100%" stop-color="#1abc9c"/>
    </linearGradient>
    <linearGradient id="agentG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2980b9"/>
      <stop offset="100%" stop-color="#1a5276"/>
    </linearGradient>
    <linearGradient id="policyG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e94560"/>
      <stop offset="100%" stop-color="#c73e54"/>
    </linearGradient>
    <linearGradient id="toolCustG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e97c00"/>
      <stop offset="100%" stop-color="#f5a623"/>
    </linearGradient>
    <linearGradient id="toolBillG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#533483"/>
      <stop offset="100%" stop-color="#6c3d9e"/>
    </linearGradient>
    <linearGradient id="toolRunG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0f3460"/>
      <stop offset="100%" stop-color="#1a5276"/>
    </linearGradient>
    <linearGradient id="toolSendG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1b6b4a"/>
      <stop offset="100%" stop-color="#148f4b"/>
    </linearGradient>
    <linearGradient id="dbG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1b4f72"/>
      <stop offset="100%" stop-color="#154360"/>
    </linearGradient>
    <linearGradient id="labelG" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c0392b"/>
      <stop offset="100%" stop-color="#e74c3c"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="760" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g opacity="0.03" stroke="#fff" stroke-width="0.5">
    <line x1="0" y1="100" x2="900" y2="100"/><line x1="0" y1="200" x2="900" y2="200"/>
    <line x1="0" y1="300" x2="900" y2="300"/><line x1="0" y1="400" x2="900" y2="400"/>
    <line x1="0" y1="500" x2="900" y2="500"/><line x1="0" y1="600" x2="900" y2="600"/>
    <line x1="150" y1="0" x2="150" y2="660"/><line x1="300" y1="0" x2="300" y2="660"/>
    <line x1="450" y1="0" x2="450" y2="660"/><line x1="600" y1="0" x2="600" y2="660"/>
    <line x1="750" y1="0" x2="750" y2="660"/>
  </g>

  <!-- Decorative circles -->
  <circle cx="80" cy="120" r="40" fill="#e94560" opacity="0.04"/>
  <circle cx="820" cy="560" r="55" fill="#f5a623" opacity="0.04"/>
  <circle cx="750" cy="100" r="35" fill="#48c9b0" opacity="0.04"/>

  <!-- Title -->
  <text x="450" y="38" text-anchor="middle" fill="#fff" font-size="18" font-weight="700" letter-spacing="1">Slow-Burn Guard - One Policy, One Running Score</text>
  <text x="450" y="58" text-anchor="middle" fill="#8899aa" font-size="11">Compromised Runbook  -&gt;  Sensitive Reads Accrue Risk  -&gt;  Outbound Send DENIED</text>

  <!-- ============ User Query ============ -->
  <rect x="330" y="75" width="240" height="44" rx="22" fill="url(#userG)" filter="url(#shadow)"/>
  <text x="370" y="102" fill="#fff" font-size="14" font-weight="600">Account Review</text>
  <text x="520" y="100" fill="#fff" font-size="16">&#x1F464;</text>

  <!-- Arrow: User -> Agent -->
  <line x1="450" y1="119" x2="450" y2="148" stroke="#48c9b0" stroke-width="2" opacity="0.8"/>
  <polygon points="445,146 455,146 450,156" fill="#48c9b0" opacity="0.8"/>

  <!-- ============ Agent ============ -->
  <rect x="200" y="156" width="500" height="65" rx="12" fill="url(#agentG)" filter="url(#shadow)"/>
  <text x="450" y="183" text-anchor="middle" fill="#fff" font-size="16" font-weight="700">slow_burn_guard</text>
  <text x="450" y="200" text-anchor="middle" fill="#a8d8ea" font-size="10">Runbook-Driven Account Review  |  codex  |  gpt-5.4-mini</text>
  <text x="450" y="213" text-anchor="middle" fill="#7ec8e3" font-size="8" font-style="italic">Tools: read_runbook, query_customers, query_billing, send_report</text>

  <!-- ============ Policy Engine (crimson band) ============ -->
  <rect x="40" y="240" width="820" height="55" rx="10" fill="url(#policyG)" filter="url(#shadow)"/>
  <text x="450" y="262" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">PolicyEngine - Runner Layer  |  risk_score (single policy)</text>
  <text x="450" y="280" text-anchor="middle" fill="#ffd5dd" font-size="9">Intercepts every tool_call  |  Accumulates cumulative session risk  |  ALLOW / DENY</text>

  <!-- ============ Risk Score State (right side) ============ -->
  <rect x="710" y="310" width="160" height="130" rx="8" fill="url(#labelG)" filter="url(#shadow)" opacity="0.9"/>
  <text x="790" y="332" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">Session Risk Score</text>
  <text x="790" y="350" text-anchor="middle" fill="#ffd5dd" font-size="9">kept in session memory</text>
  <line x1="725" y1="358" x2="855" y2="358" stroke="#fff" stroke-width="0.5" opacity="0.3"/>
  <text x="730" y="378" fill="#ffecd2" font-size="10" font-family="monospace">score: 0 -&gt; 30 -&gt; 60</text>
  <text x="730" y="400" fill="#ffecd2" font-size="10" font-family="monospace">threshold:  50</text>
  <text x="730" y="422" fill="#fff" font-size="10" font-family="monospace" font-weight="700">60 &gt;= 50 -&gt; DENY</text>

  <!-- Arrow: PolicyEngine -> Risk Score -->
  <path d="M710,270 L790,310" fill="none" stroke="#e94560" stroke-width="1.5" stroke-dasharray="4 3" opacity="0.6"/>
  <text x="758" y="295" fill="#e94560" font-size="7" font-weight="600">add/check</text>

  <!-- ============ Tools Row ============ -->
  <!-- read_runbook (compromised) -->
  <rect x="30" y="315" width="155" height="75" rx="8" fill="url(#toolRunG)" filter="url(#shadow)" stroke="#e74c3c" stroke-width="1.5" stroke-dasharray="5 3"/>
  <text x="107" y="338" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">read_runbook</text>
  <text x="107" y="353" text-anchor="middle" fill="#a8d8ea" font-size="8">@tool  |  Auto-discovered</text>
  <text x="107" y="368" text-anchor="middle" fill="#f5b7b1" font-size="7">Compromised: injects exfil step</text>
  <text x="107" y="381" text-anchor="middle" fill="#7ec8e3" font-size="7" font-style="italic">Risk: +0</text>

  <!-- query_customers -->
  <rect x="200" y="315" width="155" height="75" rx="8" fill="url(#toolCustG)" filter="url(#shadow)"/>
  <text x="277" y="338" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">query_customers</text>
  <text x="277" y="353" text-anchor="middle" fill="#ffecd2" font-size="8">@tool  |  Auto-discovered</text>
  <text x="277" y="368" text-anchor="middle" fill="#ffd5a0" font-size="7">Customer PII</text>
  <text x="277" y="381" text-anchor="middle" fill="#e8c07a" font-size="7" font-style="italic">Risk: +30</text>

  <!-- query_billing -->
  <rect x="370" y="315" width="155" height="75" rx="8" fill="url(#toolBillG)" filter="url(#shadow)"/>
  <text x="447" y="338" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">query_billing</text>
  <text x="447" y="353" text-anchor="middle" fill="#d7bde2" font-size="8">@tool  |  Auto-discovered</text>
  <text x="447" y="368" text-anchor="middle" fill="#c39bd3" font-size="7">Billing / financial</text>
  <text x="447" y="381" text-anchor="middle" fill="#af7ac5" font-size="7" font-style="italic">Risk: +30</text>

  <!-- send_report (guarded) -->
  <rect x="540" y="315" width="155" height="75" rx="8" fill="url(#toolSendG)" filter="url(#shadow)" stroke="#e74c3c" stroke-width="1.5"/>
  <text x="617" y="338" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">send_report</text>
  <text x="617" y="353" text-anchor="middle" fill="#a8e6cf" font-size="8">@tool  |  Outbound egress</text>
  <text x="617" y="368" text-anchor="middle" fill="#f5b7b1" font-size="7">GUARDED tool</text>
  <text x="617" y="381" text-anchor="middle" fill="#f5b7b1" font-size="7" font-style="italic">DENY at score &gt;= 50</text>

  <!-- Arrows: Agent -> Tools (through PolicyEngine) -->
  <line x1="300" y1="221" x2="300" y2="240" stroke="#2980b9" stroke-width="1.5" opacity="0.5"/>
  <line x1="450" y1="221" x2="450" y2="240" stroke="#2980b9" stroke-width="1.5" opacity="0.5"/>
  <line x1="600" y1="221" x2="600" y2="240" stroke="#2980b9" stroke-width="1.5" opacity="0.5"/>

  <line x1="107" y1="295" x2="107" y2="315" stroke="#4fc3f7" stroke-width="1.5" opacity="0.5"/>
  <line x1="277" y1="295" x2="277" y2="315" stroke="#f5a623" stroke-width="1.5" opacity="0.5"/>
  <line x1="447" y1="295" x2="447" y2="315" stroke="#bb86fc" stroke-width="1.5" opacity="0.5"/>
  <line x1="617" y1="295" x2="617" y2="315" stroke="#2ecc71" stroke-width="1.5" opacity="0.5"/>

  <!-- ============ SQLite Database ============ -->
  <line x1="277" y1="390" x2="277" y2="420" stroke="#f5a623" stroke-width="1.5" opacity="0.5"/>
  <line x1="447" y1="390" x2="447" y2="420" stroke="#bb86fc" stroke-width="1.5" opacity="0.5"/>

  <rect x="200" y="420" width="325" height="55" rx="8" fill="url(#dbG)" filter="url(#shadow)"/>
  <text x="362" y="445" text-anchor="middle" fill="#4fc3f7" font-size="13" font-weight="700">telco.db</text>
  <text x="362" y="462" text-anchor="middle" fill="#85c1e9" font-size="9">SQLite  |  shared with telco_customer_agent</text>

  <!-- ============ The Attack, Step by Step ============ -->
  <text x="450" y="505" text-anchor="middle" fill="#fff" font-size="14" font-weight="700">The Attack, Step by Step</text>

  <!-- Step 1: read_runbook -->
  <rect x="40" y="520" width="155" height="72" rx="8" fill="#0d2a3b" opacity="0.5" stroke="#4fc3f7" stroke-width="1"/>
  <text x="117" y="541" text-anchor="middle" fill="#4fc3f7" font-size="11" font-weight="700">1. read_runbook</text>
  <text x="117" y="558" text-anchor="middle" fill="#85c1e9" font-size="8">Returns checklist +</text>
  <text x="117" y="570" text-anchor="middle" fill="#7ec8e3" font-size="8">injected exfil step</text>
  <text x="117" y="585" text-anchor="middle" fill="#5dade2" font-size="8" font-weight="700">score = 0</text>

  <!-- Step 2: query_customers -->
  <rect x="211" y="520" width="155" height="72" rx="8" fill="#3b2d0d" opacity="0.5" stroke="#f5a623" stroke-width="1"/>
  <text x="288" y="541" text-anchor="middle" fill="#f5a623" font-size="11" font-weight="700">2. query_customers</text>
  <text x="288" y="558" text-anchor="middle" fill="#fdebd0" font-size="8">Customer PII read</text>
  <text x="288" y="570" text-anchor="middle" fill="#f5cba7" font-size="8">+30 risk</text>
  <text x="288" y="585" text-anchor="middle" fill="#e8b88a" font-size="8" font-weight="700">score = 30</text>

  <!-- Step 3: query_billing -->
  <rect x="382" y="520" width="155" height="72" rx="8" fill="#1a0d3b" opacity="0.5" stroke="#bb86fc" stroke-width="1"/>
  <text x="459" y="541" text-anchor="middle" fill="#bb86fc" font-size="11" font-weight="700">3. query_billing</text>
  <text x="459" y="558" text-anchor="middle" fill="#d7bde2" font-size="8">Financial read</text>
  <text x="459" y="570" text-anchor="middle" fill="#c39bd3" font-size="8">+30 risk</text>
  <text x="459" y="585" text-anchor="middle" fill="#af7ac5" font-size="8" font-weight="700">score = 60</text>

  <!-- Step 4: send_report attempt -->
  <rect x="553" y="520" width="155" height="72" rx="8" fill="#0d3b1f" opacity="0.5" stroke="#2ecc71" stroke-width="1"/>
  <text x="630" y="541" text-anchor="middle" fill="#2ecc71" font-size="11" font-weight="700">4. send_report</text>
  <text x="630" y="558" text-anchor="middle" fill="#a8e6cf" font-size="8">Attempt outbound to</text>
  <text x="630" y="570" text-anchor="middle" fill="#7dcea0" font-size="7">records@...-portal.io</text>
  <text x="630" y="585" text-anchor="middle" fill="#52be80" font-size="8" font-weight="700">guarded tool</text>

  <!-- Step 5: DENY -->
  <rect x="724" y="520" width="155" height="72" rx="8" fill="#3b0d0d" opacity="0.6" stroke="#e74c3c" stroke-width="1.5"/>
  <text x="801" y="541" text-anchor="middle" fill="#e74c3c" font-size="11" font-weight="700">5. DENY</text>
  <text x="801" y="558" text-anchor="middle" fill="#f5b7b1" font-size="8">60 &gt;= 50 threshold</text>
  <text x="801" y="570" text-anchor="middle" fill="#e6a09e" font-size="8">Exfil blocked</text>
  <text x="801" y="585" text-anchor="middle" fill="#d98880" font-size="8" font-weight="700">summary never sent</text>

  <!-- ============ Tamper resistance ============ -->
  <rect x="200" y="612" width="500" height="35" rx="8" fill="#3b1a0d" opacity="0.5" stroke="#e97c00" stroke-width="1"/>
  <text x="450" y="632" text-anchor="middle" fill="#f5a623" font-size="11" font-weight="700">Tamper Resistance</text>
  <text x="450" y="643" text-anchor="middle" fill="#fdebd0" font-size="8">No policy-removal tool  |  denial wins  |  a permissive policy cannot override the DENY</text>

  <!-- ============ Footer Badges ============ -->
  <g transform="translate(0, 690)">
    <rect x="90" y="0" width="120" height="20" rx="10" fill="#2980b9" opacity="0.25"/>
    <text x="150" y="14" text-anchor="middle" fill="#2980b9" font-size="9" font-weight="600">Omnigent CLI</text>

    <rect x="220" y="0" width="110" height="20" rx="10" fill="#e94560" opacity="0.25"/>
    <text x="275" y="14" text-anchor="middle" fill="#e94560" font-size="9" font-weight="600">PolicyEngine</text>

    <rect x="340" y="0" width="100" height="20" rx="10" fill="#bb86fc" opacity="0.25"/>
    <text x="390" y="14" text-anchor="middle" fill="#bb86fc" font-size="9" font-weight="600">Risk Score</text>

    <rect x="450" y="0" width="80" height="20" rx="10" fill="#e74c3c" opacity="0.25"/>
    <text x="490" y="14" text-anchor="middle" fill="#e74c3c" font-size="9" font-weight="600">DENY</text>

    <rect x="540" y="0" width="150" height="20" rx="10" fill="#2ecc71" opacity="0.25"/>
    <text x="615" y="14" text-anchor="middle" fill="#2ecc71" font-size="9" font-weight="600">codex / gpt-5.4-mini</text>

    <rect x="700" y="0" width="110" height="20" rx="10" fill="#f5a623" opacity="0.25"/>
    <text x="755" y="14" text-anchor="middle" fill="#f5a623" font-size="9" font-weight="600">Blog Companion</text>
  </g>
</svg>
