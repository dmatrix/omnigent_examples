<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 580" font-family="'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="userG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#48c9b0"/>
      <stop offset="100%" stop-color="#1abc9c"/>
    </linearGradient>
    <linearGradient id="agentG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2980b9"/>
      <stop offset="100%" stop-color="#1a5276"/>
    </linearGradient>
    <linearGradient id="buildG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e97c00"/>
      <stop offset="100%" stop-color="#f5a623"/>
    </linearGradient>
    <linearGradient id="searchG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#533483"/>
      <stop offset="100%" stop-color="#6c3d9e"/>
    </linearGradient>
    <linearGradient id="dbG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1b4f72"/>
      <stop offset="100%" stop-color="#154360"/>
    </linearGradient>
    <linearGradient id="responseG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#48c9b0"/>
      <stop offset="100%" stop-color="#1abc9c"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="580" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g opacity="0.03" stroke="#fff" stroke-width="0.5">
    <line x1="0" y1="100" x2="900" y2="100"/><line x1="0" y1="200" x2="900" y2="200"/>
    <line x1="0" y1="300" x2="900" y2="300"/><line x1="0" y1="400" x2="900" y2="400"/>
    <line x1="0" y1="500" x2="900" y2="500"/>
    <line x1="150" y1="0" x2="150" y2="580"/><line x1="300" y1="0" x2="300" y2="580"/>
    <line x1="450" y1="0" x2="450" y2="580"/><line x1="600" y1="0" x2="600" y2="580"/>
    <line x1="750" y1="0" x2="750" y2="580"/>
  </g>

  <!-- Decorative circles -->
  <circle cx="80" cy="100" r="40" fill="#4fc3f7" opacity="0.04"/>
  <circle cx="820" cy="450" r="55" fill="#bb86fc" opacity="0.04"/>

  <!-- Title -->
  <text x="450" y="38" text-anchor="middle" fill="#fff" font-size="18" font-weight="700" letter-spacing="1">MLflow Docs RAG Agent — OmniAgents Architecture</text>
  <text x="450" y="58" text-anchor="middle" fill="#8899aa" font-size="11">Self-Building RAG Pipeline with Databricks OpenAI (gpt-5.5)</text>

  <!-- ============ User Query ============ -->
  <rect x="330" y="75" width="240" height="44" rx="22" fill="url(#userG)" filter="url(#shadow)"/>
  <text x="370" y="102" fill="#fff" font-size="14" font-weight="600">User Query</text>
  <text x="520" y="100" fill="#fff" font-size="16">&#x1F464;</text>

  <!-- Arrow: User -> Agent -->
  <line x1="450" y1="119" x2="450" y2="148" stroke="#48c9b0" stroke-width="2" opacity="0.8"/>
  <polygon points="445,146 455,146 450,156" fill="#48c9b0" opacity="0.8"/>

  <!-- ============ Agent ============ -->
  <rect x="220" y="156" width="460" height="70" rx="12" fill="url(#agentG)" filter="url(#shadow)"/>
  <text x="450" y="183" text-anchor="middle" fill="#fff" font-size="16" font-weight="700">rag_mlflow_docs</text>
  <text x="450" y="200" text-anchor="middle" fill="#a8d8ea" font-size="10">Prompt-Driven Routing  |  openai-agents  |  databricks-gpt-5-5</text>
  <text x="450" y="215" text-anchor="middle" fill="#7ec8e3" font-size="9" font-style="italic">First query: build_docs_db then search_docs  |  Subsequent: search_docs only</text>

  <!-- Route labels and arrows -->
  <!-- Left: build_docs_db (first query) -->
  <path d="M350,226 L350,250 L240,250 L240,280" fill="none" stroke="#f5a623" stroke-width="2" stroke-dasharray="5 3" opacity="0.7"/>
  <polygon points="235,278 245,278 240,288" fill="#f5a623" opacity="0.7"/>
  <rect x="265" y="240" width="72" height="18" rx="9" fill="#f5a623" opacity="0.2"/>
  <text x="301" y="253" text-anchor="middle" fill="#f5a623" font-size="8" font-weight="600">first query</text>

  <!-- Right: search_docs (every query) -->
  <path d="M550,226 L550,250 L660,250 L660,280" fill="none" stroke="#bb86fc" stroke-width="2" opacity="0.7"/>
  <polygon points="655,278 665,278 660,288" fill="#bb86fc" opacity="0.7"/>
  <rect x="565" y="240" width="72" height="18" rx="9" fill="#bb86fc" opacity="0.2"/>
  <text x="601" y="253" text-anchor="middle" fill="#bb86fc" font-size="8" font-weight="600">every query</text>

  <!-- ============ build_docs_db Tool ============ -->
  <rect x="100" y="288" width="280" height="85" rx="10" fill="url(#buildG)" filter="url(#shadow)"/>
  <text x="240" y="315" text-anchor="middle" fill="#fff" font-size="14" font-weight="700">build_docs_db</text>
  <text x="240" y="332" text-anchor="middle" fill="#ffecd2" font-size="10">@tool  |  Auto-discovered</text>
  <text x="240" y="350" text-anchor="middle" fill="#ffd5a0" font-size="9">Embeds 10 MLflow doc pages via OpenAI API</text>
  <text x="240" y="365" text-anchor="middle" fill="#e8c07a" font-size="8" font-style="italic">Creates mlflow_docs.db with documents + embedding vectors</text>

  <!-- ============ search_docs Tool ============ -->
  <rect x="520" y="288" width="280" height="85" rx="10" fill="url(#searchG)" filter="url(#shadow)"/>
  <text x="660" y="315" text-anchor="middle" fill="#fff" font-size="14" font-weight="700">search_docs</text>
  <text x="660" y="332" text-anchor="middle" fill="#d7bde2" font-size="10">@tool  |  Auto-discovered</text>
  <text x="660" y="350" text-anchor="middle" fill="#c39bd3" font-size="9">Cosine similarity over document embeddings</text>
  <text x="660" y="365" text-anchor="middle" fill="#af7ac5" font-size="8" font-style="italic">Returns top-k docs with relevance scores</text>

  <!-- Arrow: build -> DB -->
  <line x1="240" y1="373" x2="240" y2="403" stroke="#f5a623" stroke-width="1.5" opacity="0.6"/>
  <polygon points="236,401 244,401 240,409" fill="#f5a623" opacity="0.6"/>

  <!-- Arrow: search -> DB -->
  <line x1="660" y1="373" x2="660" y2="403" stroke="#bb86fc" stroke-width="1.5" opacity="0.6"/>
  <polygon points="656,401 664,401 660,409" fill="#bb86fc" opacity="0.6"/>

  <!-- ============ SQLite Database ============ -->
  <rect x="220" y="409" width="460" height="65" rx="10" fill="url(#dbG)" filter="url(#shadow)"/>
  <text x="450" y="435" text-anchor="middle" fill="#4fc3f7" font-size="14" font-weight="700">mlflow_docs.db</text>
  <text x="450" y="452" text-anchor="middle" fill="#85c1e9" font-size="10">SQLite  |  10 documents  |  text-embedding-3-small vectors</text>
  <text x="450" y="466" text-anchor="middle" fill="#7f8c8d" font-size="8">Tables: documents(doc_id, content) + embeddings(doc_id, vector)</text>

  <!-- Arrow: DB -> Response -->
  <line x1="450" y1="474" x2="450" y2="500" stroke="#4fc3f7" stroke-width="2" opacity="0.6"/>
  <polygon points="445,498 455,498 450,508" fill="#4fc3f7" opacity="0.6"/>

  <!-- ============ Response ============ -->
  <rect x="330" y="508" width="240" height="38" rx="19" fill="url(#responseG)" filter="url(#shadow)" opacity="0.85"/>
  <text x="450" y="532" text-anchor="middle" fill="#fff" font-size="13" font-weight="600">Grounded Answer</text>

  <!-- ============ Footer Badges ============ -->
  <g transform="translate(0, 558)">
    <rect x="145" y="0" width="130" height="20" rx="10" fill="#2980b9" opacity="0.25"/>
    <text x="210" y="14" text-anchor="middle" fill="#2980b9" font-size="9" font-weight="600">OmniAgents CLI</text>

    <rect x="290" y="0" width="120" height="20" rx="10" fill="#f5a623" opacity="0.25"/>
    <text x="350" y="14" text-anchor="middle" fill="#f5a623" font-size="9" font-weight="600">OpenAI Agents</text>

    <rect x="425" y="0" width="130" height="20" rx="10" fill="#bb86fc" opacity="0.25"/>
    <text x="490" y="14" text-anchor="middle" fill="#bb86fc" font-size="9" font-weight="600">Semantic Search</text>

    <rect x="570" y="0" width="130" height="20" rx="10" fill="#4fc3f7" opacity="0.25"/>
    <text x="635" y="14" text-anchor="middle" fill="#4fc3f7" font-size="9" font-weight="600">MLflow Docs</text>
  </g>
</svg>
