<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 720" font-family="'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="userG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#48c9b0"/>
      <stop offset="100%" stop-color="#1abc9c"/>
    </linearGradient>
    <linearGradient id="serverG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2980b9"/>
      <stop offset="100%" stop-color="#1a5276"/>
    </linearGradient>
    <linearGradient id="webuiG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#8e44ad"/>
      <stop offset="100%" stop-color="#6c3483"/>
    </linearGradient>
    <linearGradient id="runnerG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e97c00"/>
      <stop offset="100%" stop-color="#f5a623"/>
    </linearGradient>
    <linearGradient id="harnessG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#c0392b"/>
      <stop offset="100%" stop-color="#e74c3c"/>
    </linearGradient>
    <linearGradient id="policyG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e94560"/>
      <stop offset="100%" stop-color="#c73e54"/>
    </linearGradient>
    <linearGradient id="llmG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#533483"/>
      <stop offset="100%" stop-color="#6c3d9e"/>
    </linearGradient>
    <linearGradient id="dbG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1b4f72"/>
      <stop offset="100%" stop-color="#154360"/>
    </linearGradient>
    <linearGradient id="cliG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1b6b4a"/>
      <stop offset="100%" stop-color="#148f4b"/>
    </linearGradient>
    <linearGradient id="toolG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#7d6608"/>
      <stop offset="100%" stop-color="#b7950b"/>
    </linearGradient>
    <linearGradient id="termG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1a5276"/>
      <stop offset="100%" stop-color="#21618c"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="720" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g opacity="0.03" stroke="#fff" stroke-width="0.5">
    <line x1="0" y1="100" x2="900" y2="100"/><line x1="0" y1="200" x2="900" y2="200"/>
    <line x1="0" y1="300" x2="900" y2="300"/><line x1="0" y1="400" x2="900" y2="400"/>
    <line x1="0" y1="500" x2="900" y2="500"/><line x1="0" y1="600" x2="900" y2="600"/>
    <line x1="150" y1="0" x2="150" y2="720"/><line x1="300" y1="0" x2="300" y2="720"/>
    <line x1="450" y1="0" x2="450" y2="720"/><line x1="600" y1="0" x2="600" y2="720"/>
    <line x1="750" y1="0" x2="750" y2="720"/>
  </g>

  <!-- Decorative circles -->
  <circle cx="80" cy="120" r="40" fill="#2ecc71" opacity="0.04"/>
  <circle cx="820" cy="500" r="55" fill="#f5a623" opacity="0.04"/>
  <circle cx="750" cy="100" r="35" fill="#48c9b0" opacity="0.04"/>

  <!-- Title -->
  <text x="450" y="38" text-anchor="middle" fill="#fff" font-size="18" font-weight="700" letter-spacing="1">OmniAgents Architecture &#x2014; Fully Local Mode</text>
  <text x="450" y="58" text-anchor="middle" fill="#8899aa" font-size="11">1&#x2013;2 Terminals  |  No Databricks  |  Direct LLM API Keys</text>

  <!-- ==================== ALL LOCAL ZONE ==================== -->
  <rect x="30" y="75" width="840" height="600" rx="12" fill="none" stroke="#2ecc71" stroke-width="1.5" stroke-dasharray="6 4" opacity="0.4"/>
  <rect x="40" y="67" width="180" height="20" rx="4" fill="#1a1a2e"/>
  <text x="50" y="81" fill="#2ecc71" font-size="11" font-weight="700">ALL ON LOCALHOST  (laptop)</text>

  <!-- Browser -->
  <rect x="60" y="100" width="170" height="44" rx="22" fill="url(#userG)" filter="url(#shadow)"/>
  <text x="115" y="127" fill="#fff" font-size="13" font-weight="600">Browser</text>
  <text x="165" y="125" fill="#fff" font-size="14">&#x1F310;</text>

  <!-- Terminal REPL -->
  <rect x="670" y="100" width="170" height="44" rx="22" fill="url(#cliG)" filter="url(#shadow)"/>
  <text x="722" y="127" fill="#fff" font-size="13" font-weight="600">Terminal REPL</text>
  <text x="820" y="125" fill="#fff" font-size="12">&#x2328;</text>

  <!-- Arrow: Browser -> Server (Web UI built in) -->
  <line x1="145" y1="144" x2="145" y2="175" stroke="#48c9b0" stroke-width="2" opacity="0.8"/>
  <line x1="145" y1="175" x2="310" y2="210" stroke="#48c9b0" stroke-width="2" opacity="0.8"/>
  <polygon points="308,205 308,215 318,210" fill="#48c9b0" opacity="0.8"/>
  <text x="200" y="185" fill="#8899aa" font-size="7">localhost:8000</text>

  <!-- OmniAgents Server (with Web UI built in) -->
  <rect x="310" y="190" width="300" height="90" rx="10" fill="url(#serverG)" filter="url(#shadow)"/>
  <text x="460" y="215" text-anchor="middle" fill="#fff" font-size="14" font-weight="700">OmniAgents Server</text>
  <text x="460" y="232" text-anchor="middle" fill="#a8d8ea" font-size="9">FastAPI + Uvicorn  |  localhost:8000</text>
  <text x="460" y="248" text-anchor="middle" fill="#5dade2" font-size="7">omnigents server start</text>

  <!-- Web UI badge inside server -->
  <rect x="320" y="255" width="110" height="18" rx="4" fill="url(#webuiG)" opacity="0.8"/>
  <text x="375" y="267" text-anchor="middle" fill="#fff" font-size="8" font-weight="600">Web UI (built-in)</text>

  <!-- Arrow: Terminal -> Server -->
  <line x1="755" y1="144" x2="755" y2="175" stroke="#2ecc71" stroke-width="1.5" opacity="0.5"/>
  <line x1="755" y1="175" x2="610" y2="220" stroke="#2ecc71" stroke-width="1.5" opacity="0.5"/>
  <polygon points="613,215 613,225 603,220" fill="#2ecc71" opacity="0.5"/>
  <text x="695" y="170" fill="#8899aa" font-size="7">REST/SSE</text>

  <!-- Database (local SQLite) -->
  <rect x="670" y="210" width="170" height="50" rx="6" fill="url(#dbG)" filter="url(#shadow)"/>
  <text x="755" y="233" text-anchor="middle" fill="#4fc3f7" font-size="10" font-weight="600">Local SQLite</text>
  <text x="755" y="247" text-anchor="middle" fill="#85c1e9" font-size="7">conversations</text>
  <text x="755" y="257" text-anchor="middle" fill="#85c1e9" font-size="7">conversation_labels</text>

  <!-- Arrow: Server -> DB -->
  <line x1="610" y1="240" x2="670" y2="240" stroke="#2980b9" stroke-width="1.5" opacity="0.5"/>

  <!-- Arrow: Server -> Runner (local HTTP) -->
  <line x1="460" y1="280" x2="460" y2="330" stroke="#f5a623" stroke-width="2" opacity="0.8"/>
  <polygon points="455,328 465,328 460,338" fill="#f5a623" opacity="0.8"/>
  <text x="475" y="310" fill="#8899aa" font-size="7">localhost</text>

  <!-- Runner -->
  <rect x="280" y="340" width="360" height="65" rx="10" fill="url(#runnerG)" filter="url(#shadow)"/>
  <text x="460" y="365" text-anchor="middle" fill="#fff" font-size="14" font-weight="700">Runner</text>
  <text x="460" y="380" text-anchor="middle" fill="#ffecd2" font-size="9">Spawns harnesses  |  Resolves tool calls  |  Manages OS env</text>
  <text x="460" y="394" text-anchor="middle" fill="#ffd5a0" font-size="7">omnigents host</text>

  <!-- PolicyEngine -->
  <rect x="660" y="340" width="180" height="65" rx="8" fill="url(#policyG)" filter="url(#shadow)"/>
  <text x="750" y="365" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">PolicyEngine</text>
  <text x="750" y="380" text-anchor="middle" fill="#ffd5dd" font-size="8">Labels  |  ALLOW/DENY/ASK</text>
  <text x="750" y="394" text-anchor="middle" fill="#f5b7b1" font-size="7">runtime/policies/engine.py</text>

  <!-- Harness -->
  <rect x="310" y="435" width="300" height="55" rx="8" fill="url(#harnessG)" filter="url(#shadow)"/>
  <text x="460" y="458" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">Harness (subprocess)</text>
  <text x="460" y="472" text-anchor="middle" fill="#f5b7b1" font-size="9">claude-sdk | openai-agents | codex | native-claude | native-codex</text>
  <text x="460" y="484" text-anchor="middle" fill="#e6a09e" font-size="7">omnigents/inner/*_harness.py  |  LLM-tool loop</text>

  <!-- Arrow: Runner -> Harness -->
  <line x1="460" y1="405" x2="460" y2="435" stroke="#e97c00" stroke-width="1.5" opacity="0.7"/>
  <polygon points="455,433 465,433 460,443" fill="#e97c00" opacity="0.7"/>
  <text x="475" y="425" fill="#8899aa" font-size="7">UDS</text>

  <!-- Tools (local) -->
  <rect x="60" y="435" width="220" height="55" rx="8" fill="url(#toolG)" filter="url(#shadow)"/>
  <text x="170" y="458" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">Local Tools + Files</text>
  <text x="170" y="472" text-anchor="middle" fill="#fdebd0" font-size="8">@tool Python  |  SQLite  |  MCP servers</text>
  <text x="170" y="484" text-anchor="middle" fill="#f5cba7" font-size="7">Local filesystem  |  Terminals  |  Sandboxes</text>

  <!-- Arrow: Runner -> Tools -->
  <line x1="310" y1="385" x2="250" y2="435" stroke="#b7950b" stroke-width="1.5" opacity="0.6"/>
  <polygon points="246,431 254,437 244,439" fill="#b7950b" opacity="0.6"/>

  <!-- No AI Gateway box -->
  <rect x="310" y="515" width="300" height="35" rx="6" fill="#0d3b1f" opacity="0.3" stroke="#2ecc71" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="460" y="537" text-anchor="middle" fill="#2ecc71" font-size="9" font-weight="600">No AI Gateway &#x2014; Direct API Calls</text>

  <!-- Arrow: Harness -> No Gateway -->
  <line x1="460" y1="490" x2="460" y2="515" stroke="#c0392b" stroke-width="1.5" opacity="0.5"/>

  <!-- LLM (direct API) -->
  <rect x="310" y="570" width="300" height="50" rx="22" fill="url(#llmG)" filter="url(#shadow)"/>
  <text x="460" y="593" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">Direct Model API</text>
  <text x="460" y="608" text-anchor="middle" fill="#d7bde2" font-size="8">ANTHROPIC_API_KEY  |  OPENAI_API_KEY  |  Gateway  |  Ollama</text>

  <!-- Arrow: No Gateway -> LLM -->
  <line x1="460" y1="550" x2="460" y2="570" stroke="#148f4b" stroke-width="1.5" opacity="0.6"/>
  <polygon points="455,568 465,568 460,578" fill="#148f4b" opacity="0.6"/>

  <!-- Prereq callout -->
  <rect x="60" y="560" width="220" height="50" rx="8" fill="#3b2d0d" opacity="0.4" stroke="#f5a623" stroke-width="1"/>
  <text x="170" y="580" text-anchor="middle" fill="#f5a623" font-size="10" font-weight="700">Prerequisites</text>
  <text x="170" y="595" text-anchor="middle" fill="#fdebd0" font-size="7">omnigents setup</text>
  <text x="170" y="605" text-anchor="middle" fill="#fdebd0" font-size="7">export ANTHROPIC_API_KEY=... or OPENAI_API_KEY=...</text>

  <!-- ============ Footer Badges ============ -->
  <g transform="translate(0, 688)">
    <rect x="50" y="0" width="140" height="20" rx="10" fill="#2980b9" opacity="0.25"/>
    <text x="120" y="14" text-anchor="middle" fill="#2980b9" font-size="9" font-weight="600">OmniAgents Server</text>

    <rect x="185" y="0" width="80" height="20" rx="10" fill="#8e44ad" opacity="0.25"/>
    <text x="225" y="14" text-anchor="middle" fill="#8e44ad" font-size="9" font-weight="600">Web UI</text>

    <rect x="280" y="0" width="80" height="20" rx="10" fill="#f5a623" opacity="0.25"/>
    <text x="320" y="14" text-anchor="middle" fill="#f5a623" font-size="9" font-weight="600">Runner</text>

    <rect x="375" y="0" width="80" height="20" rx="10" fill="#e94560" opacity="0.25"/>
    <text x="415" y="14" text-anchor="middle" fill="#e94560" font-size="9" font-weight="600">Policies</text>

    <rect x="470" y="0" width="80" height="20" rx="10" fill="#c0392b" opacity="0.25"/>
    <text x="510" y="14" text-anchor="middle" fill="#c0392b" font-size="9" font-weight="600">Harness</text>

    <rect x="565" y="0" width="80" height="20" rx="10" fill="#b7950b" opacity="0.25"/>
    <text x="605" y="14" text-anchor="middle" fill="#f5cba7" font-size="9" font-weight="600">Tools</text>

    <rect x="660" y="0" width="80" height="20" rx="10" fill="#533483" opacity="0.25"/>
    <text x="700" y="14" text-anchor="middle" fill="#bb86fc" font-size="9" font-weight="600">Direct API</text>

    <rect x="755" y="0" width="80" height="20" rx="10" fill="#1b4f72" opacity="0.25"/>
    <text x="795" y="14" text-anchor="middle" fill="#4fc3f7" font-size="9" font-weight="600">SQLite</text>
  </g>
</svg>
